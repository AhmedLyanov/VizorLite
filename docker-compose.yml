version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: vizorlite-mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: vizorlite-backend
    restart: always
    env_file:
      - ./backend/.env
    ports:
      - "3000:3000"
    depends_on:
      - mongo

  frontend:
    build: ./frontend
    container_name: vizorlite-frontend
    restart: always
    ports:
      - "4000:80"
    depends_on:
      - backend

volumes:
  mongo_data:
